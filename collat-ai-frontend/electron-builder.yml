appId: com.collatai.app
productName: Collat.AI
copyright: Copyright © 2026 Collat.AI

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Collat.AI
